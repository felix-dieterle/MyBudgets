name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & sign release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') || 'default' }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract version name
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName\s*=' app/build.gradle.kts | sed 's/.*versionName\s*=\s*"\(.*\)"/\1/')
          if [ -z "$VERSION_NAME" ]; then
            echo "ERROR: Could not extract versionName from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          APK_NAME="MyBudgets-${{ github.run_number }}-${{ steps.version.outputs.version_name }}.apk"
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyBudgets-${{ github.run_number }}-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/${{ env.APK_NAME }}
          retention-days: 90
